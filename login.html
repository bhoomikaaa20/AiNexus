<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="description" content="Login to your AI Nexus account.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav>
        <div class="nav-container">
            <a href="index.html" class="logo">AI <span>Nexus</span></a>
            <div class="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="basics.html">AI Basics</a></li>
                <li><a href="technologies.html">Technologies</a></li>
                <li><a href="applications.html">Applications</a></li>
                <li><a href="comparison.html">Comparison</a></li>
                <li><a href="login.html">Login</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </div>
    </nav>

    <section class="hero container" style="min-height: 80vh; padding-top: 120px; align-items: flex-start;">
        <div class="grid-2">
            <div class="fade-in" style="display: flex; flex-direction: column; justify-content: center;">
                <img src="assets/images/login_hero.png" alt="Secure Login Interface" style="width: 100%; border-radius: 12px; box-shadow: 0 0 30px rgba(0, 240, 255, 0.2);">
            </div>
            <div class="form-container card fade-in" style="width: 100%;">
                <h2 style="margin-bottom: 2rem; text-align: center;">Access Portal</h2>
                <form id="loginForm" class="styled-form">
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="text" id="email" placeholder="agent@ainexus.com">
                        <div class="error-msg"></div>
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" placeholder="••••••••">
                        <div class="error-msg"></div>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Initialize Session</button>
                </form>
            </div>
        </div>
    </section>

    <footer>
        <div class="container">
            <p>&copy; 2026 AI Nexus. All rights reserved.</p>
        </div>
    </footer>

    <script src="js/script.js"></script>
